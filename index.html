<style>
:root{
  --navy:#1a2744;--navy2:#243259;--blue:#2E75B6;--accent:#f5a623;
  --ok:#27ae60;--warn:#e67e22;--danger:#c0392b;
  --bg:#f0f4fa;--card:#fff;--border:#dde3ef;
  --text:#1a2744;--text2:#5a6a8a;--text3:#9aaac8;
  --r:14px;--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);}
#app{display:flex;flex-direction:column;height:100%;max-width:600px;margin:0 auto;}

/* TOPBAR */
.tb{background:var(--navy);padding:calc(10px + var(--safe-top)) 14px 10px;display:flex;align-items:center;gap:10px;flex-shrink:0;min-height:56px;}
.tb-back{background:rgba(255,255,255,.13);border:none;color:#fff;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px;flex-shrink:0;}
.tb-info{flex:1;min-width:0;}
.tb-title{font-size:16px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tb-sub{font-size:11px;color:rgba(255,255,255,.5);margin-top:1px;}
.tb-btn{background:rgba(255,255,255,.15);border:none;color:#fff;padding:7px 13px;border-radius:18px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.tb-btn.accent{background:var(--accent);}

/* TABBAR */
.tabbar{background:var(--navy);display:flex;border-top:1px solid rgba(255,255,255,.07);padding-bottom:var(--safe-bot);flex-shrink:0;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:9px 2px 7px;cursor:pointer;gap:3px;border:none;background:none;}
.tab svg{width:21px;height:21px;stroke:rgba(255,255,255,.35);stroke-width:1.8;fill:none;transition:stroke .2s;}
.tab span{font-size:10px;color:rgba(255,255,255,.35);font-weight:500;transition:color .2s;}
.tab .tind{width:20px;height:2px;background:var(--accent);border-radius:2px;opacity:0;transition:opacity .2s;}
.tab.active svg{stroke:#fff;}.tab.active span{color:#fff;}.tab.active .tind{opacity:1;}

/* SCREEN */
.screen{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.si{padding:14px 14px 28px;}

/* CARDS */
.card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:14px;}
.card+.card{margin-top:10px;}

/* HOME */
.hero{background:var(--navy);border-radius:var(--r);padding:18px;margin-bottom:14px;position:relative;overflow:hidden;}
.hero::after{content:'';position:absolute;top:-20px;right:-20px;width:100px;height:100px;border-radius:50%;background:rgba(245,166,35,.1);}
.hero-lbl{font-size:11px;color:rgba(255,255,255,.5);font-weight:600;text-transform:uppercase;letter-spacing:.8px;}
.hero-title{font-size:22px;font-weight:700;color:#fff;margin:3px 0 2px;}
.hero-sub{font-size:12px;color:rgba(255,255,255,.5);}
.hero-bar{height:5px;background:rgba(255,255,255,.15);border-radius:3px;margin-top:14px;overflow:hidden;}
.hero-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .5s;}
.hero-pct{font-size:11px;color:rgba(255,255,255,.4);margin-top:5px;}
.stats3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:14px;}
.sc{background:var(--card);border-radius:11px;padding:12px 8px;text-align:center;border:1px solid var(--border);}
.sc-val{font-size:22px;font-weight:700;font-family:'DM Mono',monospace;}
.sc-lbl{font-size:10px;color:var(--text2);margin-top:2px;font-weight:500;}
.sec-lbl{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin:14px 0 8px 2px;}
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.tc{background:var(--card);border-radius:var(--r);padding:14px;cursor:pointer;border:1px solid var(--border);}
.tc:active{background:#f5f8ff;}
.tc-ico{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:9px;}
.tc-ico svg{width:20px;height:20px;fill:none;stroke-width:1.8;}
.tc h3{font-size:13px;font-weight:600;color:var(--text);margin-bottom:1px;}
.tc p{font-size:11px;color:var(--text2);}
.pb{height:4px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden;}
.pbf{height:100%;border-radius:2px;transition:width .4s;}

/* LIST */
.srch{position:relative;margin-bottom:12px;}
.srch input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px 10px 36px;font-size:14px;color:var(--text);outline:none;font-family:'DM Sans',sans-serif;}
.srch svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:var(--text3);fill:none;stroke-width:2;}
.grp-hd{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;padding:10px 2px 5px;display:flex;align-items:center;justify-content:space-between;}
.er{background:var(--card);border-radius:10px;margin-bottom:5px;display:flex;align-items:center;padding:11px 12px;cursor:pointer;border:1px solid var(--border);}
.er:active{background:#f5f8ff;}
.er-dot{width:8px;height:8px;border-radius:50%;margin-right:10px;flex-shrink:0;}
.er-dot.done{background:var(--ok);}
.er-dot.partial{background:var(--warn);}
.er-dot.pending{background:var(--border);border:1.5px solid var(--text3);}
.er-dot.alert{background:var(--danger);}
.er-info{flex:1;min-width:0;}
.er-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.er-sub{font-size:11px;color:var(--text2);margin-top:1px;}
.er-chev{width:13px;height:13px;stroke:var(--text3);fill:none;stroke-width:2;margin-left:4px;flex-shrink:0;}

/* FORM */
.fhdr{background:var(--navy);border-radius:var(--r);padding:14px;margin-bottom:12px;}
.fhdr-code{font-size:10px;color:rgba(255,255,255,.45);font-weight:600;text-transform:uppercase;letter-spacing:.8px;}
.fhdr-name{font-size:16px;font-weight:600;color:#fff;margin:2px 0 3px;}
.fhdr-sys{font-size:12px;color:rgba(255,255,255,.5);}
.wchips{display:flex;gap:7px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;}
.wchip{flex-shrink:0;background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:7px 12px;text-align:center;cursor:pointer;min-width:62px;}
.wchip.active{background:var(--navy);border-color:var(--navy);}
.wchip b{font-size:12px;font-weight:600;color:var(--text2);display:block;}
.wchip small{font-size:10px;color:var(--text3);display:block;margin-top:1px;}
.wchip.active b,.wchip.active small{color:#fff;}
.flbl{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;padding:12px 0 7px;display:flex;align-items:center;gap:5px;}
.pc{background:var(--card);border-radius:11px;padding:13px;margin-bottom:7px;border:1px solid var(--border);}
.pc.pal{border-color:var(--danger);background:#fff8f8;}
.pc.pwarn{border-color:var(--warn);background:#fffbf4;}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
.pname{font-size:13px;font-weight:600;}
.pref{font-size:11px;color:var(--text2);background:var(--bg);padding:2px 8px;border-radius:20px;}
.prow{display:flex;align-items:center;gap:9px;}
.pinp{flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:10px;font-size:16px;font-family:'DM Mono',monospace;font-weight:500;color:var(--text);outline:none;text-align:center;transition:border-color .15s;}
.pinp:focus{border-color:var(--blue);}
.pinp.pok{border-color:var(--ok);background:#f0fff5;}
.pinp.pal2{border-color:var(--danger);background:#fff0f0;}
.pinp.pwarn2{border-color:var(--warn);background:#fffbf0;}
.punit{font-size:12px;color:var(--text2);min-width:30px;font-weight:500;}
.pico{font-size:17px;min-width:22px;text-align:center;}
.ac-row{display:flex;gap:7px;}
.ac-btn{flex:1;padding:10px 4px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:var(--card);color:var(--text2);transition:all .15s;}
.ac-btn.sel-ok{background:#059669;border-color:#059669;color:#fff;}
.ac-btn.sel-bad{background:#dc2626;border-color:#dc2626;color:#fff;}
.ac-btn.sel-na{background:#6b7280;border-color:#6b7280;color:#fff;}
.ti-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.ti{background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:9px 10px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text);outline:none;width:100%;}
.ti:focus{border-color:var(--blue);}
.txta{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:9px;padding:10px 11px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text);outline:none;resize:none;min-height:60px;}
.txta:focus{border-color:var(--blue);}
.savebtn{width:100%;background:var(--navy);color:#fff;border:none;border-radius:11px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px;}
.savebtn:active{background:var(--navy2);}
.savebtn svg{width:17px;height:17px;fill:none;stroke:#fff;stroke-width:2;}

/* EDITOR */
.edit-section{background:var(--card);border-radius:var(--r);border:1px solid var(--border);margin-bottom:10px;overflow:hidden;}
.edit-sec-hd{display:flex;align-items:center;padding:12px 14px;gap:10px;cursor:pointer;}
.edit-sec-hd:active{background:#f5f8ff;}
.edit-sec-name{flex:1;font-size:14px;font-weight:600;color:var(--text);}
.edit-sec-cnt{font-size:11px;color:var(--text3);}
.edit-sec-chev{width:14px;height:14px;stroke:var(--text3);fill:none;stroke-width:2;transition:transform .2s;}
.edit-sec-chev.open{transform:rotate(90deg);}

.wlbl{font-size:16px;font-weight:600;text-align:center;}
.wdate{font-size:11px;color:var(--text2);text-align:center;margin-top:1px;}
.rep-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px;}
.rsc{background:var(--card);border-radius:11px;padding:13px;border:1px solid var(--border);}

.rsc-val{font-size:21px;font-weight:700;font-family:'DM Mono',monospace;}
.chart-card{background:var(--card);border-radius:var(--r);padding:14px;margin-bottom:11px;border:1px solid var(--border);}
.chart-title{font-size:13px;font-weight:600;margin-bottom:2px;}
.chart-sub{font-size:11px;color:var(--text2);margin-bottom:11px;}

.exp-row{display:flex;gap:8px;margin-bottom:14px;}

.al-item.al-warn{background:#fffbf0;border-color:#fde68a;}
.al-dot{width:7px;height:7px;border-radius:50%;background:var(--danger);margin-top:5px;flex-shrink:0;}

.al-eq{font-size:13px;font-weight:600;}
.al-par{font-size:12px;color:var(--text2);margin-top:1px;}

.eq-badges{display:flex;gap:4px;margin-top:3px;flex-wrap:wrap;}

.badge.hib{background:#dbeafe;color:#1d4ed8;}
.badge.mant{background:#fef3c7;color:#92400e;}
.badge.ok2{background:#d1fae5;color:#065f46;}
.badge.rev{background:#fee2e2;color:#991b1b;}

.status-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px;}
.stog{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:11px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .15s;}

.stog.act-mant{border-color:#d97706;background:#fffbeb;}
.stog.act-ok{border-color:#059669;background:#ecfdf5;}
.stog.act-rev{border-color:#dc2626;background:#fef2f2;}
.stog-ico{font-size:20px;flex-shrink:0;}
.stog-info{flex:1;min-width:0;}
.stog-name{font-size:12px;font-weight:600;color:var(--text);}

.modal-row{display:flex;gap:8px;}
.modal-cancel{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;color:var(--text2);}
.modal-ok{flex:2;background:var(--navy);border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;color:#fff;}

.col-opt{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--bg);border-radius:8px;margin-bottom:5px;cursor:pointer;}
.col-opt input[type=checkbox]{width:16px;height:16px;accent-color:var(--navy);cursor:pointer;flex-shrink:0;}
.col-opt label{font-size:13px;color:var(--text);cursor:pointer;flex:1;}

.ptbl{border-collapse:collapse;width:100%;font-size:11px;}
.ptbl th{background:var(--navy);color:#fff;padding:7px 10px;text-align:left;white-space:nowrap;font-weight:600;}
.ptbl td{padding:6px 10px;border-bottom:1px solid var(--border);white-space:nowrap;color:var(--text);}
.ptbl tr:last-child td{border-bottom:none;}
.ptbl tr:nth-child(even) td{background:#f8faff;}

.drive-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;margin-bottom:10px;}
.drive-badge.connected{background:#d1fae5;color:#065f46;}
.drive-badge.disconnected{background:#fee2e2;color:#991b1b;}
.drive-badge.syncing{background:#dbeafe;color:#1d4ed8;}
.drive-sync-bar{background:var(--card);border-radius:11px;padding:12px 14px;margin-bottom:12px;border:1px solid var(--border);display:flex;align-items:center;gap:10px;}

.drive-sync-title{font-size:13px;font-weight:600;color:var(--text);}
.drive-sync-sub{font-size:11px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{background:var(--ok);}.toast.err{background:var(--danger);}
.loading{position:fixed;inset:0;background:rgba(26,39,68,.8);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:1000;opacity:0;pointer-events:none;transition:opacity .2s;}
.loading.show{opacity:1;pointer-events:all;}
.spinner{width:38px;height:38px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
.ltxt{color:#fff;font-size:14px;font-weight:500;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{text-align:center;padding:40px 20px;}
.empty svg{width:44px;height:44px;stroke:var(--text3);fill:none;stroke-width:1.5;margin-bottom:10px;}
.empty h3{font-size:15px;font-weight:600;color:var(--text2);margin-bottom:5px;}
.empty p{font-size:12px;color:var(--text3);}

// ═══════════════════════ DATA ACCESS ════════════════════════════
function getTypes(){ return DB.get('eq_types', DEFAULT_TYPES); }
function saveTypes(t){ DB.set('eq_types',t); }

function uid(){ return Math.random().toString(36).slice(2,9); }

function getAllEquips(){
  const all=[];
  for(const t of getTypes())
    for(const s of t.sections)
      for(const e of s.equips)
        all.push({...e, typeId:t.id, typeName:t.name, typeColor:t.color, sectionId:s.id, sectionName:s.name, params:getParamsForEquip(t,e.id)});
  return all;
}

function getParamsForEquip(type, equipId){
  // check per-equip override, else use section override, else type default
  const eq = type.sections.flatMap(s=>s.equips).find(e=>e.id===equipId);
  return eq?.params || type.defaultParams;
}

function loadEntry(week, equipId){ return DB.get(`e_${week}_${equipId}`,{}); }
function saveEntry(week, equipId, data){ DB.set(`e_${week}_${equipId}`,data); }

function getCfg(){ return DB.get('cfg',{currentWeek:1,totalWeeks:12,startDate:'',folderId:''}); }
function getCurWeek(){ return getCfg().currentWeek||1; }

function weekDateRange(w){
  const cfg=getCfg();
  if(!cfg.startDate) return `Semana ${w}`;
  const d=new Date(cfg.startDate);
  d.setDate(d.getDate()+(w-1)*7);
  const e=new Date(d); e.setDate(e.getDate()+6);
  return `${d.getDate()}/${d.getMonth()+1} – ${e.getDate()}/${e.getMonth()+1}`;
}

function getStats(week){
  const all=getAllEquips(); let done=0,partial=0,alerts=[];
  for(const eq of all){
    const en=loadEntry(week,eq.id);
    const params=eq.params;
    const filled=params.filter(p=>en[p.key]!==undefined&&en[p.key]!=='');
    const hasObs = en.obs && en.obs.trim() !== '';
    if(params.length>0 && (filled.length === params.length || (filled.length > 0 && hasObs))) done++;
    else if(filled.length>0 || hasObs) partial++;
    const np=params.filter(p=>p.type==='num');
    for(const p of np){
      if(p.max&&en[p.key]!==undefined&&en[p.key]!==''){
        const v=parseFloat(en[p.key]);
        if(!isNaN(v)&&v>p.max) alerts.push({equip:eq.name,param:p.name,value:v,ref:p.max,sev:'danger'});
        else if(p.warn&&!isNaN(v)&&v>p.warn) alerts.push({equip:eq.name,param:p.name,value:v,ref:p.max,sev:'warn'});
      }
    }
  }
  return {total:all.length,done,partial,pending:all.length-done-partial,alerts};
}

function nav(s, opts={}){
  _prevScreen=_screen; _screen=s;
  ['home','list','reports','editor'].forEach(x=>{
    document.getElementById('tab-'+x)?.classList.toggle('active',x===s);
  });
  setTb();
  if(s==='home') renderHome();
  else if(s==='list'){ _listType=opts.type||null; renderList(); }
  else if(s==='form'){ _curEquip=opts.equip; renderForm(); }
  else if(s==='reports'){ _repWeek=getCurWeek(); renderReports(); }
  else if(s==='editor') renderEditor();
  else if(s==='edittype') renderEditType(opts.typeId);
  else if(s==='editsection') renderEditSection(opts.typeId, opts.sectionId);
}

function goBack(){
  if(_screen==='form') nav('list',{type:_curEquip?.typeId});
  else if(_screen==='edittype') nav('editor');
  else if(_screen==='editsection') nav('edittype',{typeId:_editTypeId});
  else nav('home');
}

function setTb(){
  const title=document.getElementById('tb-title');

function renderParams(params, en){
  return params.map(p=>{
    if(p.type==='ac'){
      const v=en[p.key]||'';
      return `<div class="pc">
        <div class="ph"><span class="pname">${p.name}</span><span class="pref">${p.unit}</span></div>
        <div class="ac-row">
          <button class="ac-btn ${v==='ok'?'sel-ok':''}" onclick="selAC(this,'${p.key}','ok')">✅ Bueno</button>
          <button class="ac-btn ${v==='mal'?'sel-bad':''}" onclick="selAC(this,'${p.key}','mal')">❌ Malo</button>
          <button class="ac-btn ${v==='na'?'sel-na':''}" onclick="selAC(this,'${p.key}','na')">— N/A</button>
        </div>
      </div>`;
    }
    const v=en[p.key]!==undefined?en[p.key]:'';
    let cls='',ico='';
    if(v!==''&&p.max){const n=parseFloat(v);if(!isNaN(n)){if(n>p.max){cls='pal';ico='🔴';}else if(p.warn&&n>p.warn){cls='pwarn';ico='🟡';}else ico='🟢';}}
    else if(v!=='') ico='🟢';
    return `<div class="pc ${cls}" id="pc_${p.key}">
      <div class="ph"><span class="pname">${p.name}</span><span class="pref">Ref: ${p.ref}</span></div>
      <div class="prow">
        <input class="pinp ${cls==='pal'?'pal2':cls==='pwarn'?'pwarn2':v!==''&&ico==='🟢'?'pok':''}"
          type="number" inputmode="decimal" step="0.1" placeholder="—"
          id="p_${p.key}" value="${v}"
          onchange="valP('${p.key}',${p.max||null},${p.warn||null},this)">
        <span class="punit">${p.unit}</span>
        <span class="pico" id="pi_${p.key}">${ico}</span>
      </div>
    </div>`;
  }).join('');
}

  };

function valP(key,max,warn,inp){
  const v=parseFloat(inp.value), pc=document.getElementById('pc_'+key), pi=document.getElementById('pi_'+key);
  inp.classList.remove('pok','pal2','pwarn2');
  pc.classList.remove('pal','pwarn');
  if(!isNaN(v)){
    if(max&&v>max){inp.classList.add('pal2');pc.classList.add('pal');pi.textContent='🔴';}
    else if(warn&&v>warn){inp.classList.add('pwarn2');pc.classList.add('pwarn');pi.textContent='🟡';}
    else{inp.classList.add('pok');pi.textContent='🟢';}
  } else pi.textContent='';
}

function saveForm(){
  const w=_formWeek||getCurWeek();
  const data={savedAt:new Date().toISOString()};
  // statuses
  data.stat_mant=!!document.querySelector('[onclick*="stat_mant"]')?.classList.contains('act-mant');

  data.stat_rev=!!document.querySelector('[onclick*="stat_rev"]')?.classList.contains('act-rev');
  for(const p of _curEquip.params){
    if(p.type==='ac'){
      const row=document.querySelector(`.ac-row .ac-btn[onclick*="'${p.key}'"]:not(.ac-btn:not([class*='sel']))`);
      const selBtn=[...document.querySelectorAll(`.ac-row .ac-btn`)].find(b=>
        b.getAttribute('onclick')?.includes("'"+p.key+"'") &&
        (b.classList.contains('sel-ok')||b.classList.contains('sel-bad')||b.classList.contains('sel-na'))
      );
      if(selBtn){
        if(selBtn.classList.contains('sel-ok')) data[p.key]='ok';
        else if(selBtn.classList.contains('sel-bad')) data[p.key]='mal';
        else data[p.key]='na';
      }
    } else {
      const inp=document.getElementById('p_'+p.key);
      if(inp) data[p.key]=inp.value;
    }
  }
  data.tec_mec=document.getElementById('tec_mec')?.value||'';
  data.tec_elec=document.getElementById('tec_elec')?.value||'';
  data.responsable=document.getElementById('responsable')?.value||'';
  data.obs=document.getElementById('obs')?.value||'';
  saveEntry(w,_curEquip.id,data);
  toast('✓ Guardado','ok');
}

function chRepWeek(d){ const cfg=getCfg(); _repWeek=Math.max(1,Math.min(cfg.totalWeeks||12,_repWeek+d)); renderReports(); }

function drawTypeChart(w,st){
  const ctx=document.getElementById('ch-type'); if(!ctx) return;
  if(_repCharts.type){_repCharts.type.destroy();}
  const types=getTypes();
  const labels=[], done=[], totals=[], colors=[];
  for(const t of types){
    const equips=t.sections.flatMap(s=>s.equips);
    const d=equips.filter(eq=>{
      const en=loadEntry(w,eq.id), np=t.defaultParams.filter(p=>p.type==='num');
      return np.length>0&&np.every(p=>en[p.key]!==undefined&&en[p.key]!=='');
    }).length;
    labels.push(t.name.length>10?t.name.slice(0,10)+'…':t.name);
    done.push(d); totals.push(equips.length); colors.push(t.color);
  }
  _repCharts.type=new Chart(ctx,{type:'bar',data:{labels,datasets:[
    {label:'Completados',data:done,backgroundColor:colors.map(c=>c+'cc')},
    {label:'Total',data:totals,backgroundColor:colors.map(c=>c+'33')},
  ]},options:{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{position:'bottom',labels:{font:{size:10},boxWidth:10}}},
    scales:{y:{beginAtZero:true,ticks:{font:{size:10}}},x:{ticks:{font:{size:10}}}}}});
}

function drawTrendChart(upTo){
  const ctx=document.getElementById('ch-trend'); if(!ctx) return;
  if(_repCharts.trend){_repCharts.trend.destroy();}
  const all=getAllEquips(), labels=[], data=[];
  for(let w=1;w<=upTo;w++){
    labels.push('S'+w);
    const s=getStats(w);
    data.push(Math.round(s.done/all.length*100)||0);
  }
  _repCharts.trend=new Chart(ctx,{type:'line',data:{labels,datasets:[{
    label:'% Completado',data,borderColor:'#2E75B6',backgroundColor:'#2E75B615',
    fill:true,tension:0.4,pointRadius:3,
  }]},options:{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:false}},
    scales:{y:{beginAtZero:true,max:100,ticks:{font:{size:10},callback:v=>v+'%'}},x:{ticks:{font:{size:10}}}}}});
}

  };

  // ── Función para aplicar estilo a un objeto celda SheetJS ─────
  function sc(v, s, t){
    // t: cell type override ('s'=string, 'n'=number)
    const n=Number(v);
    const isNum=!isNaN(n)&&v!==''&&v!==null&&v!==undefined&&v!=='—'&&typeof v!=='boolean';
    const cell={ v:v, s:s };
    if(t) cell.t=t;
    else if(isNum) { cell.v=n; cell.t='n'; }
    else cell.t='s';
    return cell;
  }

  // ── Escribir celdas en worksheet SheetJS ──────────────────────
  function wsSet(ws, row, col, cell){
    const addr=XLSX.utils.encode_cell({r:row,c:col});
    if(cell===null||cell===undefined) return;
    ws[addr]=cell;
  }

  function wsRange(ws, r1,c1,r2,c2){
    if(!ws['!ref']){ws['!ref']=XLSX.utils.encode_range({s:{r:r1,c:c1},e:{r:r2,c:c2}});}
    else{
      const cur=XLSX.utils.decode_range(ws['!ref']);
      ws['!ref']=XLSX.utils.encode_range({
        s:{r:Math.min(cur.s.r,r1),c:Math.min(cur.s.c,c1)},
        e:{r:Math.max(cur.e.r,r2),c:Math.max(cur.e.c,c2)}
      });
    }
  }

  // ── HOJA 1: RESUMEN EJECUTIVO ─────────────────────────────────
  function buildExecutive(){
    let gtotal=0,gmant=0,gok=0,grev=0,gobs=0,gtested=0;
    let ptotal=0,pmant=0,pok=0,prev=0,pobs=0,ptested=0;
    const typeStats=[];
    const prevW = w > 1 ? w - 1 : null;

    for(const t of types){
      const equips=t.sections.flatMap(s=>s.equips);
      let tot=equips.length,mant=0,ok=0,rev=0,obs=0;
      let p_tot=equips.length,p_mant=0,p_ok=0,p_rev=0,p_obs=0;

      for(const eq of equips){
        const en=loadEntry(w,eq.id);
        if(en.stat_mant) mant++;
        if(en.stat_ok)   ok++;
        if(en.stat_rev)  rev++;
        if(en.obs&&en.obs.trim()) obs++;

        if(prevW){
          const pen=loadEntry(prevW,eq.id);
          if(pen.stat_mant) p_mant++;
          if(pen.stat_ok)   p_ok++;
          if(pen.stat_rev)  p_rev++;
          if(pen.obs&&pen.obs.trim()) p_obs++;
        }
      }
      typeStats.push({
        name:t.name,tot,mant,ok,rev,obs,
        p_mant,p_ok,p_rev,p_obs
      });
      gtotal+=tot; gmant+=mant; gok+=ok; grev+=rev; gobs+=obs; gtested+=(ok+rev);
      pmant+=p_mant; pok+=p_ok; prev+=p_rev; pobs+=p_obs; ptested+=(p_ok+p_rev);
    }

    const ws={};
    ws['!merges']=[];
    const merges=ws['!merges'];
    let r=0; // 0-indexed row

    // Row 0: spacer (height 8)
    r=1; // Row 2 in Excel = index 1

    // Row 1 (idx 1): Title — B2:H2 merged
    wsSet(ws,r,1, sc('GRUPO CASSA — INGENIO CHAPARRASTIQUE', S.TITLE,'s'));
    for(let c=2;c<=7;c++) wsSet(ws,r,c,sc('', S.TITLE,'s'));
    merges.push({s:{r,c:1},e:{r,c:7}});
    r++;

    // Row 2 (idx 2): Subtitle — B3:H3
    wsSet(ws,r,1, sc('PROGRAMA DE PRUEBAS DE EQUIPOS  ·  '+semLabel, S.SUBTITLE,'s'));
    for(let c=2;c<=7;c++) wsSet(ws,r,c,sc('', S.SUBTITLE,'s'));
    merges.push({s:{r,c:1},e:{r,c:7}});
    r++;

    // Row 3 (idx 3): Info — B4:H4
    const infoTxt='Responsable: '+(cfg.responsable||'Marcos')+'  ·  Generado: '+today+'  ·  Dirección Industrial';
    wsSet(ws,r,1, sc(infoTxt, S.INFO,'s'));
    for(let c=2;c<=7;c++) wsSet(ws,r,c,sc('', S.INFO,'s'));
    merges.push({s:{r,c:1},e:{r,c:7}});
    r++;

    // Row 4 (idx 4): spacer
    r++;

    // Row 5 (idx 5): KPI labels — B6:G6
    const pct=v=>gtotal>0?Math.round(v/gtotal*100)+'%':'0%';
    const kpiDefs=[
      {lbl:'TOTAL EQUIPOS', val:String(gtotal), sub:'Inventario completo',  sl:S.KPI_NAVY, sv:S.KPI_VAL_NAVY, ss:S.KPI_SUB_NAVY},
      {lbl:'PROBADOS',      val:String(gtested),sub:pct(gtested)+' del total', sl:S.KPI_BLUE, sv:S.KPI_VAL_BLUE, ss:S.KPI_SUB_BLUE},
      {lbl:'EN MANTENIMIENTO',val:String(gmant),sub:'Intervenidos',         sl:S.KPI_GOLD, sv:S.KPI_VAL_GOLD, ss:S.KPI_SUB_GOLD},
      {lbl:'BUENAS COND.',  val:String(gok),    sub:pct(gok)+' aptos',     sl:S.KPI_GREEN,sv:S.KPI_VAL_GRN,  ss:S.KPI_SUB_GRN},
      {lbl:'REQUIEREN REVISIÓN',val:String(grev),sub:'Atención requerida',  sl:S.KPI_RED,  sv:S.KPI_VAL_RED,  ss:S.KPI_SUB_RED},
      {lbl:'OBSERVACIONES', val:String(gobs),   sub:'Con anotaciones',     sl:S.KPI_AMB,  sv:S.KPI_VAL_AMB,  ss:S.KPI_SUB_AMB},
    ];
    kpiDefs.forEach((k,i)=>wsSet(ws,r,1+i, sc(k.lbl,k.sl,'s')));
    r++;

    // Row 6 (idx 6): KPI values
    kpiDefs.forEach((k,i)=>wsSet(ws,r,1+i, sc(k.val,k.sv,'s')));
    r++;

    // Row 7 (idx 7): KPI subs
    kpiDefs.forEach((k,i)=>wsSet(ws,r,1+i, sc(k.sub,k.ss,'s')));
    r++;

    // Row 8 (idx 8): spacer
    r++;

    // Row 9 (idx 9): Section header — B10:H10
    wsSet(ws,r,1, sc('   RESUMEN POR TIPO DE EQUIPO',S.SEC_NAVY,'s'));
    for(let c=2;c<=7;c++) wsSet(ws,r,c,{v:'',s:S.SEC_NAVY,t:'s'});
    merges.push({s:{r,c:1},e:{r,c:7}});
    r++;

    // Row 10 (idx 10): Column headers
    const tblHdrs=['Tipo de Equipo','Total','Probados','Mantenimiento','OK','Rev. Requerida','Observaciones','Diferencia (vs S-1)'];
    wsSet(ws,r,1, sc(tblHdrs[0],S.COL_HDR_L,'s'));
    for(let i=1;i<tblHdrs.length;i++) wsSet(ws,r,1+i, sc(tblHdrs[i],S.COL_HDR,'s'));
    r++;

    // Data rows per type
    typeStats.forEach((ts,i)=>{
      const alt=i%2===1;
      const sdL=alt?S.DATA_ALT_L:S.DATA_L;
      const sd=alt?S.DATA_ALT:S.DATA;
      const tested=ts.ok+ts.rev;
      const p_tested=ts.p_ok+ts.p_rev;
      const diff = prevW ? (tested - p_tested) : 0;
      const diffTxt = prevW ? (diff > 0 ? '+'+diff : diff) : '—';
      
      let diffStyle = sd;
      if(prevW){
        if(diff > 0) diffStyle = S.DATA_OK;
        else if(diff < 0) diffStyle = S.DATA_REV_SHEET;
      }

      const sdRev=ts.rev>0?S.DATA_REV_EXEC:sd;
      wsSet(ws,r,1, sc(ts.name,sdL,'s'));
      wsSet(ws,r,2, sc(ts.tot,sd,'n'));
      wsSet(ws,r,3, sc(tested,sd,'n'));
      wsSet(ws,r,4, sc(ts.mant,sd,'n'));
      wsSet(ws,r,5, sc(ts.ok,sd,'n'));
      wsSet(ws,r,6, sc(ts.rev,sdRev,'n'));
      wsSet(ws,r,7, sc(ts.obs,sd,'n'));
      wsSet(ws,r,8, sc(diffTxt,diffStyle,'s'));
      r++;
    });

    // Totals row
    const totalDiff = prevW ? (gtested - ptested) : 0;

    wsSet(ws,r,3, sc(gtested,S.TOTAL,'n'));
    wsSet(ws,r,4, sc(gmant,S.TOTAL,'n'));
    wsSet(ws,r,5, sc(gok,S.TOTAL,'n'));
    wsSet(ws,r,6, sc(grev,S.TOTAL,'n'));
    wsSet(ws,r,7, sc(gobs,S.TOTAL,'n'));
    wsSet(ws,r,8, sc(totalDiffTxt,S.TOTAL,'s'));
    r++;

    // Spacer
    r++;

    // Alert section header — B:I
    wsSet(ws,r,1, sc('   EQUIPOS QUE REQUIEREN REVISIÓN / ATENCIÓN INMEDIATA',S.SEC_RED,'s'));
    for(let c=2;c<=8;c++) wsSet(ws,r,c,sc('',S.SEC_RED,'s'));
    merges.push({s:{r,c:1},e:{r,c:8}});
    r++;

    // Alert col headers
    const alHdrs=['Equipo','Tipo','Estado','Técnico','Observación','','',''];
    wsSet(ws,r,1, sc(alHdrs[0],S.AL_HDR,'s'));
    wsSet(ws,r,2, sc(alHdrs[1],S.AL_HDR,'s'));
    wsSet(ws,r,3, sc(alHdrs[2],S.AL_HDR,'s'));
    wsSet(ws,r,4, sc(alHdrs[3],S.AL_HDR,'s'));
    wsSet(ws,r,5, sc(alHdrs[4],S.AL_HDR,'s'));
    wsSet(ws,r,6, sc('',S.AL_HDR,'s'));
    wsSet(ws,r,7, sc('',S.AL_HDR,'s'));
    wsSet(ws,r,8, sc('',S.AL_HDR,'s'));
    r++;

    let ai=0;
    for(const t of types){
      for(const sec of t.sections){
        for(const eq of sec.equips){
          const en=loadEntry(w,eq.id);
          if(!en.stat_rev) continue;
          const alt=ai%2===1;
          const sdL=alt?S.AL_ALT_L:S.AL_DATA_L;
          const sd=alt?S.AL_ALT:S.AL_DATA;
          const sdE=alt?S.AL_ESTADO2:S.AL_ESTADO;
          let estadoTxt='⚠ Revisión';
          if(en.stat_mant) estadoTxt='🔧 Mantto  ⚠ Revisión';
          wsSet(ws,r,1, sc(eq.name,sdL,'s'));
          wsSet(ws,r,2, sc(t.name,sd,'s'));
          wsSet(ws,r,3, sc(estadoTxt,sdE,'s'));
          wsSet(ws,r,4, sc(en.tec_mec||'—',sd,'s'));
          wsSet(ws,r,5, sc(en.obs||'',sd,'s'));
          wsSet(ws,r,6, sc('',sd,'s'));
          wsSet(ws,r,7, sc('',sd,'s'));
          wsSet(ws,r,8, sc('',sd,'s'));
          r++; ai++;
        }
      }
    }

    // Spacer
    r++;

    // Footer — B:I merged
    const footerTxt='Grupo CASSA · Ingenio Chaparrastique · Dirección Industrial · Documento Confidencial';
    wsSet(ws,r,1, sc(footerTxt,S.FOOTER,'s'));
    for(let c=2;c<=8;c++) wsSet(ws,r,c,sc('',S.FOOTER,'s'));
    merges.push({s:{r,c:1},e:{r,c:8}});

    wsRange(ws,0,0,r,8);

    return ws;
  }

  // ── HOJA HISTÓRICO ACUMULADO ───────────────────────────────────
  function buildHistorySheet(){
    const cfg = getCfg();
    const totalW = cfg.totalWeeks || 12;
    const allEquips = getAllEquips();
    const ws = {};
    ws['!merges'] = [];
    const merges = ws['!merges'];
    let r = 0;

    // Title
    wsSet(ws, r, 1, sc('HISTÓRICO ACUMULADO DE PRUEBAS — TENDENCIAS POR SEMANA', S.TITLE, 's'));
    for (let c = 2; c <= (totalW + 3); c++) wsSet(ws, r, c, sc('', S.TITLE, 's'));
    merges.push({ s: { r, c: 1 }, e: { r, c: (totalW + 3) } });
    r++;

    // Subtitle
    wsSet(ws, r, 1, sc('Seguimiento de valores técnicos por equipo y semana', S.SUBTITLE, 's'));
    for (let c = 2; c <= (totalW + 3); c++) wsSet(ws, r, c, sc('', S.SUBTITLE, 's'));
    merges.push({ s: { r, c: 1 }, e: { r, c: (totalW + 3) } });
    r++;
    r++; // spacer

    // Headers
    wsSet(ws, r, 1, sc('Equipo', S.COL_HDR_WL, 's'));
    wsSet(ws, r, 2, sc('Tipo', S.COL_HDR_W, 's'));
    wsSet(ws, r, 3, sc('Parámetro', S.COL_HDR_W, 's'));
    for (let i = 1; i <= totalW; i++) {
      wsSet(ws, r, 3 + i, sc('Sem ' + i, S.COL_HDR_W, 's'));
    }
    r++;

    allEquips.forEach((eq, idx) => {
      const params = eq.params || [];
      const alt = idx % 2 === 1;
      const sdL = alt ? S.DATA_ALT_L : S.DATA_L;
      const sd = alt ? S.DATA_ALT : S.DATA;

      params.forEach((p, pIdx) => {
        wsSet(ws, r, 1, sc(eq.name, sdL, 's'));
        wsSet(ws, r, 2, sc(eq.typeName, sd, 's'));
        wsSet(ws, r, 3, sc(p.name, sd, 's'));

        for (let wIdx = 1; wIdx <= totalW; wIdx++) {
          const en = loadEntry(wIdx, eq.id);
          const val = en[p.key];
          let cellVal = '—';
          let cellStyle = sd;

          if (val !== undefined && val !== null && val !== '') {
            cellVal = fv(val, p.type);
            if (p.type === 'num') {
              const n = parseFloat(val);
              if (p.max && n > p.max) cellStyle = S.DATA_REV_SHEET;
              else if (p.warn && n > p.warn) cellStyle = S.DATA_MANT;
              else cellStyle = S.DATA_OK;
            } else if (p.type === 'ac' && val === 'ok') {
              cellStyle = S.DATA_OK;
            } else if (p.type === 'ac' && val === 'mal') {
              cellStyle = S.DATA_REV_SHEET;
            }
          }
          wsSet(ws, r, 3 + wIdx, sc(cellVal, cellStyle, 's'));
        }
        r++;
      });
      // Merge equipo and tipo cells for all its params
      if (params.length > 1) {
        merges.push({ s: { r: r - params.length, c: 1 }, e: { r: r - 1, c: 1 } });
        merges.push({ s: { r: r - params.length, c: 2 }, e: { r: r - 1, c: 2 } });
      }
    });

    wsRange(ws, 0, 0, r, totalW + 3);
    ws['!cols'] = [{ wch: 3 }, { wch: 25 }, { wch: 20 }, { wch: 25 }, ...Array(totalW).fill({ wch: 12 })];
    return ws;
  }

  // ── HOJAS POR TIPO ────────────────────────────────────────────
  function buildTypeSheet(t){
    const paramDefs=t.defaultParams;
    const NC=2+paramDefs.length+4; // B(equipo) C(cod) D(estado) params... tec_mec tec_elec obs
    const ws={};
    ws['!merges']=[];
    const merges=ws['!merges'];
    let r=0;

    // Row 0: spacer
    r=1; // start at row idx 1 (Excel row 2)

    // Title row — B:last col merged
    const titleTxt='PRUEBA DE EQUIPOS: '+t.name.toUpperCase()+'  ·  '+semLabel;
    wsSet(ws,r,1, sc(titleTxt,S.TITLE,'s'));
    for(let c=2;c<=NC;c++) wsSet(ws,r,c,sc('', S.TITLE,'s'));
    merges.push({s:{r,c:1},e:{r,c:NC}});
    r++;

    // Subtitle row
    const subTxt='Grupo CASSA · Ingenio Chaparrastique  ·  Responsable: '+(cfg.responsable||'Marcos')+'  ·  Generado: '+today;
    wsSet(ws,r,1, sc(subTxt,S.SUBTITLE,'s'));
    for(let c=2;c<=NC;c++) wsSet(ws,r,c,sc('', S.SUBTITLE,'s'));
    merges.push({s:{r,c:1},e:{r,c:NC}});
    r++;

    // Spacer row
    r++;

    // Column headers row
    const hdrs=['Equipo','Código','Estado',...paramDefs.map(p=>p.name),'Téc. Mecánico','Téc. Eléctrico','Observaciones'];
    wsSet(ws,r,1, sc(hdrs[0],S.COL_HDR_WL,'s'));
    for(let i=1;i<hdrs.length;i++) wsSet(ws,r,1+i, sc(hdrs[i],S.COL_HDR_W,'s'));
    r++;

    // Data rows
    let di=0;
    for(const sec of t.sections){
      sec.equips.forEach(eq=>{
        const en=loadEntry(w,eq.id);
        const alt=di%2===1;
        const sdL=alt?S.DATA_ALT_L:S.DATA_L;
        const sd=alt?S.DATA_ALT:S.DATA;
        const obsS=alt?S.OBS_ALT:S.OBS;

        // Estado cell
        let estadoTxt='—', estadoS=sd;
        if(en.stat_rev && en.stat_mant){ estadoTxt='🔧 Mantto  ⚠ Revisión'; estadoS=S.DATA_MANT; }
        else if(en.stat_rev)            { estadoTxt='⚠ Revisión';             estadoS=S.DATA_REV_SHEET; }
        else if(en.stat_mant)           { estadoTxt='🔧 Mantto';               estadoS=S.DATA_MANT; }
        else if(en.stat_ok)             { estadoTxt='✅ OK';                    estadoS=S.DATA_OK; }

        wsSet(ws,r,1, sc(eq.name,sdL,'s'));
        wsSet(ws,r,2, sc(eq.code||'—',sd,'s'));
        wsSet(ws,r,3, sc(estadoTxt,estadoS,'s'));
        const prevW = w > 1 ? w - 1 : null;
        const pen = prevW ? loadEntry(prevW, eq.id) : null;

        paramDefs.forEach((p,pi)=>{
          const v=fv(en[p.key],p.type);
          let cs=sd;
          let trend = '';

          if(p.type==='num' && en[p.key]!==undefined && en[p.key]!==''){
            const n2=parseFloat(en[p.key]);
            if(p.max && !isNaN(n2) && n2>p.max) cs=S.DATA_REV_SHEET;
            else if(p.warn && !isNaN(n2) && n2>p.warn) cs=S.DATA_MANT;

            // Tendencia
            if(pen && pen[p.key]!==undefined && pen[p.key]!==''){
              const nPrev = parseFloat(pen[p.key]);
              if(!isNaN(nPrev)){
                if(n2 > nPrev) trend = ' ↗';
                else if(n2 < nPrev) trend = ' ↘';
                else trend = ' =';
              }
            }
          } else if(p.type==='ac'){
            if(en[p.key]==='ok') cs=S.DATA_OK;
            else if(en[p.key]==='mal') cs=S.DATA_REV_SHEET;
            
            // Tendencia cualitativa
            if(pen && pen[p.key]!==undefined && pen[p.key]!==''){
              if(en[p.key] !== pen[p.key]) trend = ' ⇄';
            }
          }
          
          const isN=!isNaN(Number(v))&&v!=='—';
          const finalVal = isN ? (Number(v) + trend) : (v + trend);
          wsSet(ws,r,4+pi, sc(finalVal, cs, 's')); // Usamos 's' para incluir la flecha
        });
        wsSet(ws,r,4+paramDefs.length,   sc(en.tec_mec||'—',sd,'s'));
        wsSet(ws,r,4+paramDefs.length+1, sc(en.tec_elec||'—',sd,'s'));
        wsSet(ws,r,4+paramDefs.length+2, sc(en.obs||'',obsS,'s'));
        r++; di++;
      });
    }

    // Trend Legend
    const legendTxt = 'Tendencia vs Semana Anterior: ↗ Sube | ↘ Baja | = Sin cambios | ⇄ Cambio de estado';
    wsSet(ws,r,1, sc(legendTxt, S.INFO, 's'));
    for(let c=2;c<=NC;c++) wsSet(ws,r,c,sc('', S.INFO, 's'));
    merges.push({s:{r,c:1},e:{r,c:NC}});
    r++;

    // Footer
    const fTxt='Grupo CASSA  ·  Ingenio Chaparrastique  ·  Documento Confidencial';
    wsSet(ws,r,1, sc(fTxt,S.FOOTER,'s'));
    for(let c=2;c<=NC;c++) wsSet(ws,r,c,sc('',S.FOOTER,'s'));
    merges.push({s:{r,c:1},e:{r,c:NC}});

    wsRange(ws,0,0,r,NC);
    ws['!rows']=[{hpt:8},{hpt:34},{hpt:22},{hpt:10}];
    // Col widths: spacer, equipo, codigo, estado, params..., tec_mec, tec_elec, obs
    ws['!cols']=[{wch:3},{wch:26},{wch:12},{wch:24},...paramDefs.map(()=>({wch:13})),{wch:14},{wch:14},{wch:36}];
    return ws;
  }

  setTimeout(()=>{
    try{
      if(typeof XLSX==='undefined') throw new Error('SheetJS no cargó. Verifica conexión a internet.');
      const wb=XLSX.utils.book_new();
      // SheetJS CE con estilos requiere write options: {cellStyles:true}
      XLSX.utils.book_append_sheet(wb, buildExecutive(), 'Resumen Ejecutivo');
      XLSX.utils.book_append_sheet(wb, buildHistorySheet(), 'Histórico Tendencias');
      for(const t of types){
        XLSX.utils.book_append_sheet(wb, buildTypeSheet(t), t.name.substring(0,31));
      }
      XLSX.writeFile(wb,'Reporte_Equipos_Semana'+w+'_CASSA.xlsx',{cellStyles:true});
      hideLoading(); toast('✓ Excel descargado','ok');
    }catch(e){ console.error(e); hideLoading(); toast('Error: '+e.message,'err'); }
  },300);
}

let _importRows=[];
function handleImportFile(file){
  if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=new Uint8Array(e.target.result);
      // Parse CSV or XLSX
      let rows=[];
      if(file.name.endsWith('.csv')){
        const text=new TextDecoder().decode(data);
        rows=text.split('\n').map(l=>l.split(',').map(c=>c.trim().replace(/^"|"$/g,'')));
      } else {
        // minimal xlsx reader: extract shared strings + sheet data
        rows=parseXlsxSimple(data);
      }
      if(rows.length<2){toast('El archivo está vacío o no se pudo leer','err');return;}
      // detect header row
      const hdr=rows[0].map(h=>h.toLowerCase().trim());
      const iCode=hdr.findIndex(h=>h.includes('cod')||h.includes('código'));
      const iName=hdr.findIndex(h=>h.includes('nom'));
      const iType=hdr.findIndex(h=>h.includes('tipo')||h.includes('type'));
      if(iName===-1){toast('No se encontró columna "Nombre"','err');return;}
      _importRows=rows.slice(1).filter(r=>r.join('').trim()).map(r=>({
        code: iCode>=0?(r[iCode]||'').trim():'',
        name: (r[iName]||'').trim(),
        type: iType>=0?(r[iType]||'').trim():'Sin tipo',
      })).filter(r=>r.name);
      // show preview
      const area=document.getElementById('import-preview-area');
      const types=getTypes().map(t=>t.name);
      area.innerHTML=`
        <div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px">${_importRows.length} equipos detectados:</div>
        <div class="import-rows">
          ${_importRows.slice(0,30).map(r=>`<div class="ir">
            <span class="ir-code">${r.code||'—'}</span>
            <span class="ir-name">${r.name}</span>
            <span class="ir-type">${r.type}</span>
          </div>`).join('')}
          ${_importRows.length>30?`<div style="text-align:center;padding:6px;font-size:11px;color:var(--text3)">+${_importRows.length-30} más...</div>`:''}
        </div>
        <div style="margin-top:10px;font-size:12px;color:var(--text2)">Tipos no reconocidos se crearán automáticamente.</div>
      `;
      const btn=document.getElementById('import-ok-btn');
      if(btn){btn.disabled=false;btn.style.opacity='1';}
    }catch(err){console.error(err);toast('Error al leer el archivo','err');}
  };
  reader.readAsArrayBuffer(file);
}

function parseXlsxSimple(data){
  // Minimal xlsx text extraction: find xl/worksheets/sheet1.xml and xl/sharedStrings.xml in the ZIP
  const txt=new TextDecoder('utf-8',{fatal:false}).decode(data);
  // Extract shared strings
  const ssMatch=txt.match(/<sst[^>]*>([\s\S]*?)<\/sst>/);
  const ss=[];
  if(ssMatch){
    const siRe=/<si>[\s\S]*?<t[^>]*>([^<]*)<\/t>[\s\S]*?<\/si>/g;
    let m;
    while((m=siRe.exec(ssMatch[1]))!==null) ss.push(m[1].replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"')); 
  }
  // Extract first sheet
  const sheetMatch=txt.match(/<sheetData>([\s\S]*?)<\/sheetData>/);
  if(!sheetMatch) return [];
  const rows=[];
  const rowRe=/<row[^>]*>([\s\S]*?)<\/row>/g;
  const cellRe=/<c[^>]*?(t="([^"]*)")?[^>]*>[\s\S]*?<v>([^<]*)<\/v>[\s\S]*?<\/c>/g;
  let rm;
  while((rm=rowRe.exec(sheetMatch[1]))!==null){
    const cells=[]; let cm;
    while((cm=cellRe.exec(rm[1]))!==null){
      const t=cm[2], v=cm[3];
      cells.push(t==='s'?(ss[parseInt(v)]||''):v||''  );
    }
    rows.push(cells);
  }
  return rows;
}

function confirmImport(){
  if(!_importRows.length) return;
  const types=getTypes();
  let added=0;
  for(const row of _importRows){
    let t=types.find(x=>x.name.toLowerCase()===row.type.toLowerCase());
    if(!t){
      t={id:'t_'+uid(),name:row.type,color:'#6b7280',defaultParams:[
        {key:'temp_motor',name:'Temperatura Motor',ref:'≤ 70',unit:'°C',type:'num',max:70,warn:65},
        {key:'amp_motor',name:'Amperaje Motor',ref:'—',unit:'A',type:'num',max:null,warn:null},
      ],sections:[{id:'s_'+uid(),name:'Importados',equips:[]}]};
      types.push(t);
    }
    let sec=t.sections.find(s=>s.name==='Importados')||t.sections[0];
    if(!sec){sec={id:'s_'+uid(),name:'Importados',equips:[]};t.sections.push(sec);}
    const exists=t.sections.flatMap(s=>s.equips).some(e=>e.code===row.code&&e.name===row.name);
    if(!exists){sec.equips.push({id:'e_'+uid(),code:row.code,name:row.name}); added++;}
  }
  saveTypes(types);
  document.querySelector('.modal-bg')?.remove();
  renderEditor();
  toast(`✓ ${added} equipos importados`,'ok');
  _importRows=[];
}

// GOOGLE DRIVE SYNC  — OAuth2 PKCE + Drive REST API v3
// ══════════════════════════════════════════════════════════════
const DRIVE_SCOPES = 'https://www.googleapis.com/auth/drive.file';
const DRIVE_FILE_NAME = 'hibernacion_cassa_data.json';

function getDriveCfg(){ return DB.get('drive_cfg',{clientId:'',fileId:''}); }
function saveDriveCfg(obj){ DB.set('drive_cfg',Object.assign(getDriveCfg(),obj)); }

const driveState = {
  token: DB.get('drive_token', null),
  lastSync: DB.get('drive_last_sync', null),
};

// ── Login (Implicit Token Flow — no client_secret needed) ─────
function driveLogin(){
  const cfg = getDriveCfg();
  if(!cfg.clientId){ toast('⚠ Ingresa tu Client ID primero en Editor → Configuración','err'); nav('editor'); return; }
  const redirectUri = 'https://markkusgoru.github.io/Hibernacion/';
  const authUrl = 'https://accounts.google.com/o/oauth2/v2/auth?' +
    'client_id=' + encodeURIComponent(cfg.clientId) +
    '&redirect_uri=' + encodeURIComponent(redirectUri) +
    '&response_type=token' +
    '&scope=' + encodeURIComponent(DRIVE_SCOPES) +
    '&prompt=consent';
  location.href = authUrl;
}

// ── Handle OAuth2 redirect callback (Implicit Flow — token in hash) ──
async function handleOAuthCallback(){
  const hash = location.hash;
  if(!hash) return false;
  const params = new URLSearchParams(hash.substring(1));
  const token = params.get('access_token');
  if(!token) return false;
  // Clean the URL
  history.replaceState({}, document.title, location.pathname);
  driveState.token = token;
  DB.set('drive_token', token);
  DB.del('pkce_verifier');
  toast('✓ Google Drive conectado','ok');
  return true;
}

// ── Refresh token (not available in implicit flow — re-login needed) ──
async function driveRefreshToken(){
  return false;
}

function driveLogout(){
  driveState.token = null;
  DB.del('drive_token');
  saveDriveCfg({fileId:''});
  toast('Desconectado de Drive','');
  renderEditor();
}

// ── Ensure we have a valid token ──────────────────────────────
async function ensureToken(){
  if(driveState.token) return true;
  toast('Sesión Drive expirada. Reconecta en Editor → Configuración.','err');
  nav('editor');
  return false;
}

// ── Collect ALL localStorage data into one JSON ───────────────
function collectAllData(){
  const snapshot = {};
  for(let i=0; i<localStorage.length; i++){
    const k = localStorage.key(i);
    try{ snapshot[k] = JSON.parse(localStorage.getItem(k)); }
    catch{ snapshot[k] = localStorage.getItem(k); }
  }
  snapshot['_exported_at'] = new Date().toISOString();
  snapshot['_app_version'] = 'v5';
  return snapshot;
}

// ── Restore ALL data from a JSON snapshot ─────────────────────
function restoreAllData(snapshot){
  const skip = ['drive_token','drive_refresh','pkce_verifier','oauth_redirect','drive_cfg'];
  for(const [k,v] of Object.entries(snapshot)){
    if(skip.includes(k)) continue;
    try{ localStorage.setItem(k, JSON.stringify(v)); }
    catch{ localStorage.setItem(k, String(v)); }
  }
}

// ── Find existing file in Drive ───────────────────────────────
async function driveFindFile(){
  const cfg = getDriveCfg();
  if(cfg.fileId){
    // verify it still exists
    try{
      const r = await fetch(`https://www.googleapis.com/drive/v3/files/${cfg.fileId}?fields=id,name`,{
        headers:{Authorization:'Bearer '+driveState.token}
      });
      if(r.ok) return cfg.fileId;
    } catch{}
  }
  // search by name
  const q = encodeURIComponent(`name='${DRIVE_FILE_NAME}' and trashed=false`);
  const r = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`,{
    headers:{Authorization:'Bearer '+driveState.token}
  });
  const data = await r.json();
  if(data.files && data.files.length>0){
    saveDriveCfg({fileId: data.files[0].id});
    return data.files[0].id;
  }
  return null;
}

// ── Upload (PUSH) data to Drive ───────────────────────────────
async function drivePush(){
  if(!(await ensureToken())) return;
  const btn = document.getElementById('btn-drive-push-lbl');
  if(btn) btn.textContent = '⏳ Subiendo...';
  showLoading('Subiendo datos a Google Drive...');
  try{
    const cfg = getDriveCfg();
    const payload = JSON.stringify(collectAllData(), null, 2);
    const blob = new Blob([payload], {type:'application/json'});
    let fileId = await driveFindFile();

    let uploadResp;
    if(fileId){
      // Actualizar archivo existente
      uploadResp = await fetch(
        `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`,{
        method:'PATCH',
        headers:{Authorization:'Bearer '+driveState.token,'Content-Type':'application/json'},
        body: blob
      });
    } else {
      // Crear archivo nuevo con metadatos + contenido en un solo request multipart
      const meta = { name: DRIVE_FILE_NAME };
      if(cfg.folderId) meta.parents = [cfg.folderId];
      const boundary = 'hibernacion_boundary_xyz';
      const delimiter = '--' + boundary;
      const multipartBody = delimiter + '
' +
        'Content-Type: application/json

' +
        JSON.stringify(meta) + '
' +
        delimiter + '
' +
        'Content-Type: application/json

' +
        payload + '
' +
        delimiter + '--';
      uploadResp = await fetch(
        'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{
        method:'POST',
        headers:{
          Authorization:'Bearer '+driveState.token,
          'Content-Type':'multipart/related; boundary=' + boundary
        },
        body: multipartBody
      });
      if(uploadResp.ok){
        const created = await uploadResp.clone().json();
        if(created.id) saveDriveCfg({fileId: created.id});
      }
    }

    if(!uploadResp.ok) throw new Error('Upload HTTP '+uploadResp.status);
    const now = new Date().toLocaleString('es-SV');
    driveState.lastSync = now;
    DB.set('drive_last_sync', now);
    hideLoading();
    if(btn) btn.textContent = '↑ Drive';
    toast('✓ Datos subidos a Drive','ok');
    if(_screen==='home') renderHome();
  } catch(e){
    hideLoading();
    if(btn) btn.textContent = '↑ Drive';
    // Try refresh once
    if(e.message.includes('401') || e.message.includes('403')){
      driveState.token = null;
      const ok = await driveRefreshToken();
      if(ok){ drivePush(); return; }
    }
    toast('Error Drive: '+e.message,'err');
  }
}

// ── Download (PULL) data from Drive ──────────────────────────
async function drivePull(){
  if(!(await ensureToken())) return;
  showLoading('Descargando datos de Google Drive...');
  try{
    const fileId = await driveFindFile();
    if(!fileId){ hideLoading(); toast('No se encontró archivo en Drive. Sube primero.','err'); return; }
    const r = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,{
      headers:{Authorization:'Bearer '+driveState.token}
    });
    if(!r.ok) throw new Error('Download HTTP '+r.status);
    const snapshot = await r.json();
    if(!confirm(`¿Reemplazar datos locales con la versión de Drive?\n\nFecha en Drive: ${snapshot._exported_at||'desconocida'}\n\n⚠ Los datos locales no guardados se perderán.`)){
      hideLoading(); return;
    }
    restoreAllData(snapshot);
    const now = new Date().toLocaleString('es-SV');
    driveState.lastSync = now;
    DB.set('drive_last_sync', now);
    hideLoading();
    toast('✓ Datos cargados desde Drive','ok');
    nav('home');
  } catch(e){
    hideLoading();
    if(e.message.includes('401') || e.message.includes('403')){
      driveState.token = null;
      const ok = await driveRefreshToken();
      if(ok){ drivePull(); return; }
    }
    toast('Error Drive: '+e.message,'err');
  }
}

// ── Auto-push after every saveForm() call ─────────────────────
const _origSaveForm = saveForm;
function saveForm(){
  _origSaveForm();
  // Background push if token exists
  if(driveState.token){
    setTimeout(()=>{
      drivePush().catch(()=>{});
    }, 800);
  }
}

// ── Handle OAuth callback on page load ───────────────────────
(async function initDrive(){
  if(location.hash.includes('access_token=')){
    const ok = await handleOAuthCallback();
    if(ok) renderEditor(); // muestra estado "Drive conectado"
  }
})();

// ── INIT ──────────────────────────────────────────────────────
